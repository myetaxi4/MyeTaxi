<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MyeTaxi Tracker v1.0 - Fleet Intelligence Platform">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MyeTaxi Tracker">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <title>MyeTaxi Tracker</title>
  <style>
    body { background-color: #0A0E1A; margin: 0; }
    #loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; }
    .spinner { width:40px; height:40px; border:3px solid #1E2D45; border-top:3px solid #00D4FF; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .app-title { color:#00D4FF; font-family:sans-serif; font-size:20px; margin-top:16px; letter-spacing:2px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="app-title">MyeTaxi Tracker</div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: { serviceWorkerVersion: serviceWorkerVersion },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            document.getElementById('loading').style.display = 'none';
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <script src="flutter.js" defer></script>
</body>
</html>
