name: myetaxi_tracker
description: MyeTaxi Tracker - Professional GPS Fleet Tracking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0

  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # SMS Handling
  telephony: ^0.2.0
  flutter_sms: ^2.3.3

  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  syncfusion_flutter_gauges: ^24.1.41
  timeline_tile: ^2.0.0
  badges: ^3.1.2
  lottie: ^3.0.0

  # Notifications
  flutter_local_notifications: ^16.3.2
  awesome_notifications: ^0.9.2

  # PWA / Platform
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  permission_handler: ^11.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
